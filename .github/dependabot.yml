version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    groups:
      npm-runtime:
        dependency-type: 'production'
      npm-tooling:
        dependency-type: 'development'
        patterns:
          - '*'
    open-pull-requests-limit: 10
    commit-message:
      prefix: 'deps(app)'
    labels:
      - 'dependencies'
      - 'dependabot'

  - package-ecosystem: 'docker'
    directory: '/'
    schedule:
      interval: 'weekly'
    groups:
      docker-images:
        patterns:
          - '*'
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'deps(docker)'
    labels:
      - 'dependencies'
      - 'dependabot'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    groups:
      github-actions:
        patterns:
          - '*'
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'ci'
    labels:
      - 'dependencies'
      - 'dependabot'
